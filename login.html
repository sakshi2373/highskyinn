<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - High Sky Inn</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<section>

<h2>Login with OTP</h2>

<input type="text" id="phone" placeholder="+919999999999">

<div id="recaptcha"></div>

<button onclick="sendOTP()">Send OTP</button>

<br><br>

<input type="text" id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

</section>


<!-- FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>


<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCRLP44vjbyxkF68zutPVP6aapu2qktQRM",
  authDomain: "highskyinn-11f73.firebaseapp.com",
  projectId: "highskyinn-11f73",
  storageBucket: "highskyinn-11f73.firebasestorage.app",
  messagingSenderId: "712373389301",
  appId: "1:712373389301:web:20b3efd6f057153bb8c2bc",
  measurementId: "G-NXKCDNM05K"
};

// INITIALIZE
firebase.initializeApp(firebaseConfig);


// RECAPTCHA
window.onload = function () {

window.recaptchaVerifier =
new firebase.auth.RecaptchaVerifier('recaptcha', {
size: 'normal'
});

recaptchaVerifier.render();

};


// SEND OTP
function sendOTP(){

let phone =
document.getElementById("phone").value;

firebase.auth()
.signInWithPhoneNumber(
phone,
window.recaptchaVerifier
)

.then(function(result){

window.confirmationResult = result;

alert("OTP Sent");

})

.catch(function(error){

console.log(error);

alert(error.message);

});

}


// VERIFY OTP
function verifyOTP(){

let otp =
document.getElementById("otp").value;


if(!window.confirmationResult){

alert("Please Send OTP First");

return;

}


window.confirmationResult.confirm(otp)

.then(function(result){

let name = prompt("Enter Your Name");

localStorage.setItem(
"name",
name || "User"
);

alert("Login Successful");

window.location.href =
"dashboard.html";

})

.catch(function(error){

alert("Wrong OTP");

});

}

</script>

</body>
</html>
